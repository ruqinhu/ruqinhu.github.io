<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 | 赵润泽的博客</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/apple.css">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Reading Progress Bar -->
    <div class="reading-progress-container">
        <div class="reading-progress-bar" id="progress-bar"></div>
    </div>

    <!-- Navigation -->
    <nav class="apple-nav">
        <div class="nav-content">
            <a href="./index.html" style="text-decoration: none; color: inherit;">
                <span style="font-weight: 700; font-size: 18px; letter-spacing: -1px;">RUNZE ZHAO</span>
            </a>
            <ul class="nav-links">
                <li><a href="./index.html">首页</a></li>
                <li><a href="./index.html#blog">博文</a></li>
                <li><a href="https://github.com/ruqinhu">GitHub</a></li>
            </ul>
        </div>
    </nav>

    <!-- Article Content -->
    <main class="article-wrapper">
        <article class="markdown-body" id="markdown-container">
            <div style="text-align: center; padding: 100px;">
                <p style="color: var(--secondary-text);">正在为您加载精彩内容...</p>
            </div>
        </article>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>Copyright © 2026 赵润泽 (Runze Zhao). 保留所有权利。</p>
            <div class="footer-links">
                <a href="./index.html">首页</a>
                <a href="https://github.com/ruqinhu">GitHub</a>
            </div>
        </div>
    </footer>

    <!-- JS Logic -->
    <script>
        // Progress Bar Logic
        window.onscroll = function() {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };
    </script>
    <script src="./assets/js/markdown-render.js"></script>
</body>
</html>
